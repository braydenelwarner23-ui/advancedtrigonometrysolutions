<!DOCTYPE html>
<html>
<head>

<title>Burrito Bison</title>

<style>

body{
    margin:0;
    background:#050505;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

/* TOP BAR */

.topbar{
    width:100%;
    height:60px;

    background:#111;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

    box-sizing:border-box;

    box-shadow:
        0 0 20px rgba(255,255,255,0.15);
}

/* TITLE */

.title{
    color:white;
    font-size:28px;
    font-weight:bold;
}

/* BACK BUTTON */

.back{
    color:white;
    text-decoration:none;

    font-size:18px;

    padding:10px 18px;

    border-radius:12px;

    background:#1c1c1c;

    transition:0.25s;
}

.back:hover{
    background:#2d2d2d;

    transform:scale(1.05);
}

/* GAME FRAME */

.game-frame{
    width:100vw;
    height:calc(100vh - 60px);

    border:none;
}

</style>
</head>

<body>

<div class="topbar">

    <a class="back" href="index.html">
        ← Back
    </a>

    <div class="title">
        Burrito Bison
    </div>

    <div></div>

</div>

<iframe
class="game-frame"
src="https://www.burrito-bison.com/"
allowfullscreen>
</iframe>

</body>
</html>
