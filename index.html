<!DOCTYPE html>
<html>
<head>

<title>Advanced Trigonometry Solutions</title>

<style>

body{
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:Arial;
    overflow-x:hidden;
}

/* TOP BAR */

.topbar{
    width:100%;
    padding:20px;
    background:#111;

    text-align:center;

    font-size:40px;
    font-weight:bold;

    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* GAME GRID */

.games{
    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:30px;

    padding:50px;
}

/* GAME CARD */

.game{
    background:#151515;

    border-radius:20px;

    overflow:hidden;

    transition:0.3s;

    text-decoration:none;

    color:white;

    box-shadow:
        0 0 20px rgba(255,255,255,0.1);
}

.game:hover{
    transform:scale(1.04);

    box-shadow:
        0 0 30px rgba(255,255,255,0.4);
}

.game img{
    width:100%;
    height:200px;

    object-fit:cover;
}

.game-title{
    padding:20px;

    font-size:25px;
    text-align:center;
}

</style>
</head>

<body>

<div class="topbar">
    Advanced Trigonometry Solutions
</div>

<div class="games">

    <!-- GAME 1 -->

    <a class="game" href="cookieclicker/index.html">

    <img src="https://static.wikia.nocookie.net/cookieclicker/images/5/5a/PerfectCookie.png">

    <div class="game-title">
        Cookie Clicker
    </div>

</a>

    <!-- GAME 2 -->

    <a class="game" href="https://example.com">

        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/Grosser_Panda.JPG">

        <div class="game-title">
            Retro Bowl
        </div>

    </a>

</div>

</body>
</html>
