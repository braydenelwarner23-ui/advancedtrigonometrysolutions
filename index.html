<!DOCTYPE html>
<html>
<head>
<title>Advanced Trigonometry Solutions</title>

<style>

body{
    margin:0;
    background:radial-gradient(circle at top,#1b1b1b,#050505);
    color:white;
    font-family:Arial,sans-serif;
}

/* TOP BAR */

.topbar{
    padding:25px;

    text-align:center;

    background:#111;

    box-shadow:
        0 0 25px rgba(255,255,255,0.15);
}

.topbar h1{
    margin:0;

    font-size:42px;
}

.subtitle{
    color:#aaa;

    margin-top:10px;

    font-size:18px;
}

/* GAMES GRID */

.games{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:40px;

    padding:50px;
}

/* GAME CARD */

.game{
    background:#141414;

    border-radius:25px;

    overflow:hidden;

    text-decoration:none;

    color:white;

    transition:0.25s;

    border:
    1px solid rgba(255,255,255,0.1);

    box-shadow:
    0 0 25px rgba(255,255,255,0.08);
}

.game:hover{
    transform:scale(1.04);

    box-shadow:
    0 0 40px rgba(255,255,255,0.25);
}

/* GAME IMAGE */

.game img{
    width:100%;
    height:220px;

    object-fit:contain;

    background:#0d0d0d;

    padding:20px;

    box-sizing:border-box;
}

/* TITLE */

.game-title{
    text-align:center;

    padding:22px;

    font-size:28px;

    font-weight:bold;
}

/* FOOTER */

.footer{
    text-align:center;

    color:#777;

    padding:30px;
}

</style>
</head>

<body>

<!-- TOP BAR -->

<div class="topbar">

    <h1>
        Advanced Trigonometry Solutions
    </h1>

    <div class="subtitle">
        Educational Resources
    </div>

</div>

<!-- GAMES -->

<div class="games">

    <!-- COOKIE CLICKER -->

    <a class="game" href="cookieclicker/index.html">

        <img src="https://static.wikia.nocookie.net/cookieclicker/images/5/5a/PerfectCookie.png">

        <div class="game-title">
            Cookie Clicker
        </div>

    </a>

    <!-- BURRITO BISON -->

    <a class="game" href="burritobison.html">

        <img src="burritobison.png">

        <div class="game-title">
            Burrito Bison
        </div>

    </a>

</div>

<!-- FOOTER -->

<div class="footer">
    © 2026 Advanced Trigonometry Solutions
</div>

</body>
</html>
