<!DOCTYPE html>
<html>
<head>
<title>Advanced Trigonometry Solutions</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a1a, #050505);
  color: white;
  font-family: Arial, sans-serif;
}

.topbar {
  padding: 25px;
  text-align: center;
  font-size: 38px;
  font-weight: bold;
  background: #111;
  box-shadow: 0 0 25px rgba(255,255,255,0.15);
}

.games {
  display: flex;
  justify-content: center;
  padding: 70px 25px;
}

.game {
  width: 320px;
  background: #141414;
  border-radius: 25px;
  text-decoration: none;
  color: white;
  overflow: hidden;
  box-shadow: 0 0 25px rgba(255,255,255,0.15);
  transition: 0.25s;
  border: 1px solid rgba(255,255,255,0.12);
}

.game:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(255,255,255,0.35);
}

.game img {
  width: 140px;
  height: 140px;
  object-fit: contain;
  display: block;
  margin: 30px auto 15px auto;
}

.game-title {
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  text-align: center;
}

.subtitle {
  text-align: center;
  color: #aaa;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="topbar">
  Advanced Trigonometry Solutions
  <div class="subtitle">Select a lesson</div>
</div>

<div class="games">

  <a class="game" href="cookieclicker/index.html">
    <img src="https://static.wikia.nocookie.net/cookieclicker/images/5/5a/PerfectCookie.png">
    <div class="game-title">Cookie Clicker</div>
  </a>

</div>

</body>
</html>
